{% extends "base.html" %}
{% block content %}

<div class="max-w-md mx-auto bg-slate-800 p-8 rounded-xl">

<h2 class="text-2xl mb-6 text-green-400">Login</h2>

<form method="post">
{% csrf_token %}
{{ form.as_p }}

<button class="bg-green-600 px-4 py-2 rounded w-full mt-4">
Login
</button>
</form>

<a href="/register/" class="text-blue-400 block mt-4">
Create account
</a>

</div>

{% endblock %}
