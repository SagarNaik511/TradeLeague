{% extends "base.html" %}
{% block content %}
<h1 class="text-3xl font-bold text-white mb-6">Market Overview</h1>

<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
{% for asset in assets %}
<div class="bg-fintech-darker p-6 rounded-xl border border-gray-700">
    <h2 class="text-xl font-bold text-blue-400">{{ asset.name }}</h2>
    <p class="text-gray-400 text-sm mt-2">{{ asset.info_news_text }}</p>

    <div class="mt-4 flex justify-between text-sm">
        <span class="text-green-400">{{ asset.growth_percent }}%</span>
        <span class="text-yellow-400">{{ asset.risk_level }}</span>
    </div>
</div>
{% endfor %}
</div>
{% endblock %}
