{% extends "base.html" %}
{% block content %}

<h2 class="text-3xl mb-8">Game Lobby</h2>

<div class="grid grid-cols-2 gap-8">

<!-- Create Room -->
<div class="bg-slate-800 p-8 rounded-xl">
  <h3 class="text-xl mb-4 text-green-400">Host Game</h3>
  <p>Create a new trading match</p>

  <a href="/create-room/" class="bg-green-600 px-6 py-3 rounded-xl inline-block mt-4">
    Create Room
  </a>
</div>

<!-- Join Room -->
<div class="bg-slate-800 p-8 rounded-xl">
  <h3 class="text-xl mb-4 text-blue-400">Join Game</h3>

  {% for r in rooms %}
    <div class="flex justify-between bg-slate-700 p-3 rounded mb-3">
      <span>Room {{ r.room_code }}</span>
      <a href="/waiting/{{r.id}}/" class="text-green-400">
        Join
      </a>
    </div>
  {% empty %}
    <p>No open rooms</p>
  {% endfor %}

</div>

</div>

{% endblock %}
